{% extends "base.html" %}
{% block title %}Rally Legends - Home{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero-content">
        <p class="hero-sub">The greatest names from rally's golden era</p>
        <h1 class="hero-title">
            RALLY<br>
            <span class="outline">LEGENDS</span>
        </h1>
        <div class="hero-stats">
            <div class="stat">
                <span class="stat-number">{{ driverCount }}</span>
                <span class="stat-label">Drivers</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
                <span class="stat-number">{{ carCount }}</span>
                <span class="stat-label">Cars</span>
            </div>
        </div>
        <div class="hero-actions">
            <a href="/drivers" class="btn btn-primary">Explore Drivers</a>
            <a href="/cars" class="btn btn-secondary">Explore Cars</a>
        </div>
    </div>
</section>
{% endblock %}
